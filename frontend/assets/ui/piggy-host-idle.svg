      #hand{animation:handFloat 1.72s ease-in-out infinite;transform-origin:170px 142px;}
      @keyframes breathe{0%,100%{transform:translateY(1px) scale(1)}50%{transform:translateY(-2px) scale(1.012)}}
      @keyframes handFloat{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-2deg)}}
      @keyframes blink{0%,90%,100%{opacity:1}94%,97%{opacity:0}}
      @keyframes blinkClosed{0%,90%,100%{opacity:0}94%,97%{opacity:1}}
    </style>
