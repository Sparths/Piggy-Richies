<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 306" role="img" aria-label="Piggy host idle">
  <defs>
    <linearGradient id="skin" x1="70" y1="35" x2="158" y2="160" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffd0bf"/><stop offset="0.55" stop-color="#ff987f"/><stop offset="1" stop-color="#d95c47"/></linearGradient>
    <linearGradient id="vest" x1="73" y1="132" x2="154" y2="230" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#2e8f31"/><stop offset="0.58" stop-color="#176522"/><stop offset="1" stop-color="#073c19"/></linearGradient>
    <linearGradient id="pants" x1="79" y1="210" x2="145" y2="296" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#8a471f"/><stop offset="1" stop-color="#4a220f"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%"><feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/></filter>
